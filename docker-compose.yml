# -*- coding: utf-8 -*-
# Docker Compose configuration for local development and production

version: '3.8'

services:
  # =============================================================================
  # Neo4j Database
  # =============================================================================
  neo4j:
    image: neo4j:5.16-community
    container_name: graph-rag-neo4j
    restart: unless-stopped
    ports:
      - \"7474:7474\"  # Browser
      - \"7687:7687\"  # Bolt protocol
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      NEO4J_PLUGINS: '[]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: [\"CMD\", \"cypher-shell\", \"-u\", \"neo4j\", \"-p\", \"password\", \"RETURN 1\"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - graph-rag-network

  # =============================================================================
  # Graph RAG API Server
  # =============================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${DOCKER_TARGET:-development}
    container_name: graph-rag-api
    restart: unless-stopped
    ports:
      - \"8000:8000\"
    environment:
      # Neo4j Configuration
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      
      # API Keys
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      VERCEL_TOKEN: ${VERCEL_TOKEN:-}
      CLOUDFLARE_TOKEN: ${CLOUDFLARE_TOKEN:-}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      
      # Production Settings
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-text}
      
      # Rate Limiting
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_RPM: ${RATE_LIMIT_RPM:-60}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-10}
      
      # Security
      API_KEYS: ${API_KEYS:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      SECRET_KEY: ${SECRET_KEY:-}
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: [\"CMD\", \"curl\", \"-f\", \"http://localhost:8000/health/live\"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - graph-rag-network

  # =============================================================================
  # Optional: Prometheus for metrics collection
  # =============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: graph-rag-prometheus
    restart: unless-stopped
    ports:
      - \"9090:9090\"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - graph-rag-network
    profiles:
      - monitoring

  # =============================================================================
  # Optional: Grafana for dashboards
  # =============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: graph-rag-grafana
    restart: unless-stopped
    ports:
      - \"3000:3000\"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: \"false\"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - graph-rag-network
    profiles:
      - monitoring

volumes:
  neo4j_data:
  neo4j_logs:
  prometheus_data:
  grafana_data:

networks:
  graph-rag-network:
    driver: bridge