# Prometheus configuration for Graph RAG monitoring
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'graph-rag-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics
    scheme: http

  - job_name: 'neo4j'
    static_configs:
      - targets: ['neo4j:7474']
    metrics_path: /metrics
    scheme: http